name: Quickfix CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:11.8
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Bench Setup
        run: |
          pip install frappe-bench
          bench init --skip-redis-config-generation --skip-assets --python "$(which python)" ~/frappe-bench


      - name: Install Redis
        run: |
          sudo apt-get update
          sudo apt-get install -y redis-server

      - name: Initialize bench
        run: bench init --frappe-branch version-16 frappe-bench --skip-assets

      - name: Setup site
        run: |
          cd frappe-bench
          bench new-site test.localhost \
            --mariadb-root-password root \
            --admin-password admin \
            --db-name test_quickfix

      - name: Get QuickFix app
        uses: actions/checkout@v4
        with:
          path: frappe-bench/apps/quickfix

      - name: Install app on site
        run: |
          cd frappe-bench
          pip install -e apps/quickfix

      - name: Enable developer mode
        run: |
          cd frappe-bench
          bench --site test.localhost set-config developer_mode 1

      - name: Load test fixtures
        run: |
          cd frappe-bench
          bench --site test.localhost execute quickfix.tests.setup_test_data.load_test_fixtures

      - name: Run tests
        run: |
          cd frappe-bench
          bench --site test.localhost run-tests --app quickfix --verbose